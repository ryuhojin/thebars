name = "admin-menu-manager"
compatibility_date = "2026-06-23"
pages_build_output_dir = "dist"

# Copy this file to wrangler.toml only for local Wrangler CLI work.
# Do not commit a real wrangler.toml with production database IDs.
# Cloudflare Pages production should configure the D1 binding in the
# Pages project settings:
#   binding name: DB
#   D1 database: production database
# Preview D1 is optional and intentionally omitted from this template.

[[d1_databases]]
binding = "DB"
database_name = "<production-d1-name>"
database_id = "<production-d1-id>"
migrations_dir = "db/migrations"
